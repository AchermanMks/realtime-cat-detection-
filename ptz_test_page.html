<!DOCTYPE html>
<html>
<head>
    <title>PTZ控制测试</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .btn {
            background: #4a5568;
            border: none;
            color: #fff;
            padding: 15px 20px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }
        .btn:hover {
            background: #5a6578;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            max-width: 300px;
            margin: 20px auto;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background: #333;
            border-radius: 5px;
            min-height: 100px;
        }
        .success { color: #68d391; }
        .error { color: #f56565; }
    </style>
</head>
<body>
    <h1>🎮 PTZ控制测试页面</h1>
    <p>点击按钮测试PTZ控制，结果会显示在下方</p>

    <div class="grid">
        <div></div>
        <button class="btn" onclick="testPTZ('up')">▲ 上</button>
        <div></div>
        <button class="btn" onclick="testPTZ('left')">◄ 左</button>
        <button class="btn" onclick="testPTZ('stop')" style="background: #e53e3e;">⏹ 停</button>
        <button class="btn" onclick="testPTZ('right')">► 右</button>
        <div></div>
        <button class="btn" onclick="testPTZ('down')">▼ 下</button>
        <div></div>
    </div>

    <div>
        <button class="btn" onclick="testPTZ('zoom_in')">🔍+ 放大</button>
        <button class="btn" onclick="testPTZ('zoom_out')">🔍- 缩小</button>
    </div>

    <div id="result" class="result">
        等待测试...
    </div>

    <script>
        async function testPTZ(action) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `🔄 发送PTZ命令: ${action}...`;

            try {
                const response = await fetch(`http://localhost:5000/api/ptz/${action}`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success) {
                    resultDiv.innerHTML = `<span class="success">✅ PTZ命令 "${action}" 执行成功!</span><br>` +
                                        `时间戳: ${new Date(data.timestamp * 1000).toLocaleTimeString()}<br>` +
                                        `响应数据: ${JSON.stringify(data)}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ PTZ命令 "${action}" 执行失败</span><br>` +
                                        `响应数据: ${JSON.stringify(data)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ 网络错误: ${error.message}</span><br>` +
                                    `请确保系统正在运行在 http://localhost:5000`;
            }
        }

        // 键盘控制
        document.addEventListener('keydown', function(e) {
            switch(e.key.toLowerCase()) {
                case 'w': case 'arrowup': testPTZ('up'); break;
                case 's': case 'arrowdown': testPTZ('down'); break;
                case 'a': case 'arrowleft': testPTZ('left'); break;
                case 'd': case 'arrowright': testPTZ('right'); break;
                case ' ': e.preventDefault(); testPTZ('stop'); break;
                case '=': case '+': testPTZ('zoom_in'); break;
                case '-': testPTZ('zoom_out'); break;
            }
        });

        // 显示键盘说明
        document.body.innerHTML += '<p style="margin-top: 20px; color: #a0aec0; font-size: 14px;">键盘控制: WASD移动 | 空格停止 | +/-缩放</p>';
    </script>
</body>
</html>
