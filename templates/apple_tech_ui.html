<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>🐱 AI Pet Monitoring Pro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            /* Apple-inspired colors */
            --apple-blue: #007AFF;
            --apple-green: #30D158;
            --apple-mint: #00C7BE;
            --apple-orange: #FF9F0A;
            --apple-pink: #FF375F;
            --apple-purple: #AF52DE;
            --apple-red: #FF3B30;
            --apple-yellow: #FFD60A;

            /* Tech dark theme */
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-tertiary: #1a1a1a;
            --bg-card: rgba(28, 28, 30, 0.85);
            --bg-card-hover: rgba(44, 44, 46, 0.9);

            /* Text colors */
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.85);
            --text-tertiary: rgba(255, 255, 255, 0.6);
            --text-quaternary: rgba(255, 255, 255, 0.4);

            /* Border and separators */
            --border-primary: rgba(255, 255, 255, 0.1);
            --border-secondary: rgba(255, 255, 255, 0.05);

            /* Shadows */
            --shadow-light: 0 1px 3px rgba(255, 255, 255, 0.05);
            --shadow-medium: 0 4px 12px rgba(0, 0, 0, 0.3);
            --shadow-heavy: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 20px rgba(0, 122, 255, 0.3);

            /* Timing functions */
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 122, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(175, 82, 222, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(48, 209, 88, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
            line-height: 1.5;
            font-weight: 400;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 25px 25px, rgba(255, 255, 255, 0.02) 2px, transparent 2px);
            background-size: 50px 50px;
            animation: float 20s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -50px); }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, var(--apple-blue), var(--apple-purple));
            border-radius: 2px;
        }

        .header h1 {
            font-size: clamp(32px, 4vw, 48px);
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, var(--apple-blue) 50%, var(--apple-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            position: relative;
        }

        .header h1::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-purple));
            border-radius: 20px;
            opacity: 0.1;
            filter: blur(20px);
            z-index: -1;
        }

        .header .subtitle {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .header .description {
            font-size: 14px;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        /* Main container */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 24px;
            min-height: calc(100vh - 200px);
        }

        /* Card base style */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border-primary);
            border-radius: 20px;
            padding: 24px;
            position: relative;
            transition: all 0.4s var(--ease-out);
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: var(--shadow-heavy);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-secondary);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: var(--shadow-glow);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--apple-green);
            box-shadow: 0 0 10px var(--apple-green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        /* Video panel */
        .video-panel {
            grid-column: 1;
            grid-row: 1 / 3;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: calc(100% - 80px);
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .video-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        .video-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .video-info {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Detection panel */
        .detection-panel {
            grid-column: 2;
            grid-row: 1;
        }

        .detection-list {
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-primary) transparent;
        }

        .detection-list::-webkit-scrollbar {
            width: 6px;
        }

        .detection-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .detection-list::-webkit-scrollbar-thumb {
            background: var(--border-primary);
            border-radius: 3px;
        }

        .detection-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-secondary);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s var(--ease-out);
            position: relative;
            overflow: hidden;
        }

        .detection-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--apple-green), var(--apple-mint));
        }

        .detection-item.dog::before {
            background: linear-gradient(180deg, var(--apple-blue), var(--apple-purple));
        }

        .detection-item.enhanced::before {
            background: linear-gradient(180deg, var(--apple-orange), var(--apple-yellow));
        }

        .detection-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-primary);
            transform: translateX(4px);
        }

        .pet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .pet-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 600;
        }

        .pet-emoji {
            font-size: 20px;
        }

        .confidence-badge {
            background: linear-gradient(135deg, var(--apple-green), var(--apple-mint));
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .detection-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 14px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            color: var(--text-tertiary);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Visualization panel */
        .visualization-panel {
            grid-column: 2;
            grid-row: 2;
        }

        .visualization-container {
            width: 100%;
            height: calc(100% - 80px);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-secondary);
        }

        .visualization-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }

        /* Analysis panel */
        .analysis-panel {
            grid-column: 1 / -1;
            grid-row: 3;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            padding: 0;
            background: transparent;
            border: none;
        }

        .analysis-card {
            background: var(--bg-card);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border-primary);
            border-radius: 20px;
            padding: 24px;
        }

        .vlm-analysis {
            position: relative;
        }

        .analysis-text {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-secondary);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .analysis-text::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--apple-orange), var(--apple-pink));
        }

        .analysis-timestamp {
            font-size: 12px;
            color: var(--text-quaternary);
            margin-bottom: 12px;
            font-weight: 500;
        }

        /* System status */
        .system-status {
            position: relative;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .status-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-secondary);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s var(--ease-out);
        }

        .status-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-primary);
        }

        .status-value {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .status-value.error {
            background: linear-gradient(135deg, var(--apple-red), var(--apple-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-label {
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            position: relative;
        }

        .loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid var(--apple-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            color: var(--text-quaternary);
            font-style: italic;
            padding: 40px 20px;
            font-weight: 500;
        }

        /* Floating action button */
        .fab {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-purple));
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow:
                0 8px 32px rgba(0, 122, 255, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            transition: all 0.3s var(--spring);
            z-index: 1000;
        }

        .fab:hover {
            transform: scale(1.1);
            box-shadow:
                0 12px 40px rgba(0, 122, 255, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .fab:active {
            transform: scale(0.95);
        }

        /* Responsive design */
        @media (max-width: 1400px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto;
            }

            .video-panel {
                grid-column: 1;
                grid-row: 1;
                height: 400px;
            }

            .detection-panel {
                grid-column: 1;
                grid-row: 2;
            }

            .visualization-panel {
                grid-column: 1;
                grid-row: 3;
            }

            .analysis-panel {
                grid-column: 1;
                grid-row: 4;
                grid-template-columns: 1fr;
            }

            .status-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .container {
                gap: 16px;
            }

            .card {
                padding: 20px;
                border-radius: 16px;
            }

            .header h1 {
                font-size: 28px;
            }

            .status-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .detection-details {
                grid-template-columns: 1fr;
            }

            .fab {
                bottom: 24px;
                right: 24px;
                width: 56px;
                height: 56px;
                font-size: 20px;
            }
        }

        /* Special effects */
        .glow-effect {
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px var(--apple-blue), 0 0 10px var(--apple-blue), 0 0 15px var(--apple-blue);
            }
            to {
                text-shadow: 0 0 10px var(--apple-purple), 0 0 20px var(--apple-purple), 0 0 30px var(--apple-purple);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="glow-effect">🐱 AI Pet Monitoring Pro</h1>
        <div class="subtitle">Advanced Computer Vision & 3D Spatial Intelligence</div>
        <div class="description">Real-time Detection • 3D Localization • Behavioral Analysis</div>
    </div>

    <div class="container">
        <!-- Real-time video stream -->
        <div class="card video-panel">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon">📹</div>
                    <span>实时监控</span>
                </div>
                <div class="status-dot"></div>
            </div>
            <div class="video-container">
                <img class="video-stream" src="{{ url_for('video_feed') }}" alt="Live Video Feed" />
                <div class="video-overlay">
                    <div class="video-info" id="video-info">
                        LIVE • AI Enhanced
                    </div>
                    <div class="video-info" id="frame-info">
                        Frame: 0/0
                    </div>
                </div>
            </div>
        </div>

        <!-- Detection results -->
        <div class="card detection-panel">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon">🎯</div>
                    <span>智能检测</span>
                </div>
                <div id="detection-count" style="font-size: 14px; color: var(--text-tertiary);">0 检测</div>
            </div>
            <div class="detection-list" id="detections-container">
                <div class="no-data">正在等待检测结果...</div>
            </div>
        </div>

        <!-- 3D Visualization -->
        <div class="card visualization-panel">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon">🏠</div>
                    <span>3D 空间定位</span>
                </div>
                <div style="font-size: 14px; color: var(--text-tertiary);">USD Model</div>
            </div>
            <div class="visualization-container">
                <div id="3d-visualization">
                    <div class="no-data">正在生成3D可视化...</div>
                </div>
            </div>
        </div>

        <!-- Analysis and Status -->
        <div class="analysis-panel">
            <div class="analysis-card vlm-analysis">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-icon">🤖</div>
                        <span>AI 行为分析</span>
                    </div>
                </div>
                <div class="analysis-timestamp" id="analysis-timestamp">
                    等待分析结果...
                </div>
                <div class="analysis-text" id="vlm-analysis-text">
                    增强猫检测系统正在运行，使用多模态AI技术进行精准识别和空间定位。
                </div>
            </div>

            <div class="analysis-card system-status">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-icon">⚡</div>
                        <span>系统状态</span>
                    </div>
                </div>
                <div class="status-grid" id="status-container">
                    <div class="status-item">
                        <div class="status-value"><div class="loading"></div></div>
                        <div class="status-label">加载中</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="fab" onclick="location.reload()" title="刷新页面">
        🔄
    </button>

    <script>
        // Global variables
        let currentFrame = 0;
        let totalFrames = 0;

        // Status update function
        function updateSystemStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error('Status error:', data.error);
                        return;
                    }

                    currentFrame = data.current_frame || 0;
                    totalFrames = data.total_frames || 0;

                    // Update frame info
                    document.getElementById('frame-info').textContent = `Frame: ${currentFrame}/${totalFrames}`;

                    const statusContainer = document.getElementById('status-container');
                    statusContainer.innerHTML = `
                        <div class="status-item">
                            <div class="status-value ${data.running ? '' : 'error'}">${data.running ? '●' : '○'}</div>
                            <div class="status-label">系统状态</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${data.current_detections || 0}</div>
                            <div class="status-label">当前检测</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${data.cat_detections || 0}</div>
                            <div class="status-label">猫检测</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${data.dog_detections || 0}</div>
                            <div class="status-label">狗检测</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${data.enhanced_cat_detections || 0}</div>
                            <div class="status-label">增强检测</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${data['3d_localizations'] || 0}</div>
                            <div class="status-label">3D定位</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${(data.cat_detection_rate || 0).toFixed(1)}%</div>
                            <div class="status-label">检测率</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${Math.floor(data.uptime_seconds || 0)}</div>
                            <div class="status-label">运行时长</div>
                        </div>
                    `;
                })
                .catch(error => console.error('Error fetching status:', error));
        }

        // Detection results update function
        function updateDetections() {
            fetch('/api/detections')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error('Detections error:', data.error);
                        return;
                    }

                    const detectionsContainer = document.getElementById('detections-container');
                    const detectionCount = document.getElementById('detection-count');

                    if (!data.current_detections || data.current_detections.length === 0) {
                        detectionsContainer.innerHTML = '<div class="no-data">暂无检测结果</div>';
                        detectionCount.textContent = '0 检测';
                    } else {
                        detectionCount.textContent = `${data.current_detections.length} 检测`;

                        detectionsContainer.innerHTML = data.current_detections.map((detection, index) => {
                            const isPet = detection.class_name === 'cat' || detection.class_name === 'dog';
                            const isEnhanced = detection.detection_type === 'enhanced_cat' || detection.detection_type === 'vlm_assisted';
                            const petEmoji = detection.class_name === 'cat' ? '🐱' : '🐶';
                            const petName = detection.class_name === 'cat' ? '猫咪' : '狗狗';

                            let detectionTypeText = '';
                            if (detection.detection_type === 'enhanced_cat') {
                                detectionTypeText = '🔍 增强检测';
                            } else if (detection.detection_type === 'vlm_assisted') {
                                detectionTypeText = '🤖 VLM辅助';
                            }

                            return `
                                <div class="detection-item ${detection.class_name} ${isEnhanced ? 'enhanced' : ''}">
                                    <div class="pet-header">
                                        <div class="pet-name">
                                            <span class="pet-emoji">${petEmoji}</span>
                                            <span>${petName}</span>
                                            ${detectionTypeText ? `<span style="font-size: 12px; color: var(--apple-orange);">${detectionTypeText}</span>` : ''}
                                        </div>
                                        <div class="confidence-badge">${(detection.confidence * 100).toFixed(1)}%</div>
                                    </div>
                                    <div class="detection-details">
                                        <div class="detail-item">
                                            <div class="detail-label">像素坐标</div>
                                            <div class="detail-value">(${detection.center.x}, ${detection.center.y})</div>
                                        </div>
                                        ${detection['3d_valid'] ? `
                                        <div class="detail-item">
                                            <div class="detail-label">物理坐标</div>
                                            <div class="detail-value">${detection['3d_position']['calibrated_coords'].x.toFixed(2)}, ${detection['3d_position']['calibrated_coords'].y.toFixed(2)}m</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">房间位置</div>
                                            <div class="detail-value">${detection['3d_position']['room_position']}</div>
                                        </div>
                                        <div class="detail-item">
                                            <div class="detail-label">帧编号</div>
                                            <div class="detail-value">#${detection.frame_id}</div>
                                        </div>
                                        ` : `
                                        <div class="detail-item">
                                            <div class="detail-label">3D状态</div>
                                            <div class="detail-value" style="color: var(--apple-red);">无法定位</div>
                                        </div>
                                        `}
                                    </div>
                                </div>
                            `;
                        }).join('');
                    }

                    // Update VLM analysis
                    if (data.latest_vlm_analysis) {
                        const analysisTimestamp = document.getElementById('analysis-timestamp');
                        const analysisText = document.getElementById('vlm-analysis-text');

                        const timestamp = new Date(data.latest_vlm_analysis.timestamp * 1000);
                        analysisTimestamp.textContent = `更新时间: ${timestamp.toLocaleTimeString()}`;
                        analysisText.textContent = data.latest_vlm_analysis.text;
                    }
                })
                .catch(error => console.error('Error fetching detections:', error));
        }

        // 3D visualization update function
        function update3DVisualization() {
            fetch('/api/3d_visualization')
                .then(response => response.json())
                .then(data => {
                    const visualizationDiv = document.getElementById('3d-visualization');

                    if (data.error) {
                        visualizationDiv.innerHTML = '<div class="no-data">暂无3D可视化数据</div>';
                    } else if (data.image) {
                        visualizationDiv.innerHTML = `<img class="visualization-image" src="data:image/png;base64,${data.image}" alt="3D Visualization" />`;
                    }
                })
                .catch(error => {
                    console.error('Error fetching 3D visualization:', error);
                    document.getElementById('3d-visualization').innerHTML = '<div class="no-data">3D可视化加载失败</div>';
                });
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Immediate updates
            updateSystemStatus();
            updateDetections();
            update3DVisualization();

            // Set up periodic updates
            setInterval(updateSystemStatus, 5000);    // Every 5 seconds
            setInterval(updateDetections, 2000);      // Every 2 seconds
            setInterval(update3DVisualization, 10000); // Every 10 seconds

            // Add some visual feedback
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, index) => {
                card.style.animationDelay = `${index * 0.1}s`;
                card.style.animation = 'fadeInUp 0.6s ease-out forwards';
            });
        });

        // Add fade-in animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        `;
        document.head.appendChild(style);

        // Error handling
        window.onerror = function(msg, url, line, col, error) {
            console.error('JavaScript Error:', msg, 'at', url, ':', line);
            return false;
        };
    </script>
</body>
</html>
