<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Intelligence · 智能监控系统</title>
    <style>
        /* 苹果官网设计语言 + 科技感纯黑背景 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            /* 苹果官网色彩系统 */
            --apple-blue: #007AFF;
            --apple-green: #34C759;
            --apple-orange: #FF9500;
            --apple-red: #FF3B30;
            --apple-purple: #AF52DE;
            --apple-pink: #FF2D92;
            --apple-cyan: #5AC8FA;
            --apple-yellow: #FFCC02;

            /* 科技感纯黑背景系统 */
            --bg-primary: #000000;
            --bg-secondary: #0A0A0A;
            --bg-tertiary: #111111;
            --bg-card: rgba(28, 28, 30, 0.6);
            --bg-glass: rgba(17, 17, 17, 0.7);

            /* 苹果文本层次 */
            --text-primary: rgba(255, 255, 255, 0.98);
            --text-secondary: rgba(255, 255, 255, 0.72);
            --text-tertiary: rgba(255, 255, 255, 0.56);
            --text-disabled: rgba(255, 255, 255, 0.38);

            /* 苹果边框和分割线 */
            --border-primary: rgba(255, 255, 255, 0.1);
            --border-secondary: rgba(255, 255, 255, 0.05);
            --separator: rgba(255, 255, 255, 0.08);

            /* 苹果阴影系统 */
            --shadow-small: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-medium: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            --shadow-large: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 20px rgba(0, 122, 255, 0.3);

            /* 苹果圆角系统 */
            --radius-small: 6px;
            --radius-medium: 12px;
            --radius-large: 16px;
            --radius-xl: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            background-image:
                radial-gradient(circle at 30% 30%, rgba(0, 122, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(52, 199, 89, 0.03) 0%, transparent 50%),
                linear-gradient(135deg, rgba(175, 82, 222, 0.02) 0%, transparent 50%);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
            font-feature-settings: 'kern' 1, 'liga' 1;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 苹果官网导航栏 */
        .apple-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border-secondary);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 clamp(20px, 5vw, 80px);
        }

        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-menu {
            margin-left: auto;
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-item {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-item:hover {
            color: var(--text-primary);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--apple-blue);
            border-radius: 1px;
        }

        /* 苹果官网Hero区域 - 缩小版 */
        .hero-section {
            margin-top: 72px;
            padding: 32px clamp(20px, 5vw, 80px) 24px;
            text-align: center;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9) 0%, rgba(17, 17, 17, 0.9) 100%);
        }

        .hero-title {
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .hero-subtitle {
            font-size: clamp(16px, 2.5vw, 18px);
            font-weight: 400;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto 24px;
            line-height: 1.4;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 600;
            color: var(--apple-blue);
            display: block;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 3px;
        }

        /* 苹果卡片布局系统 - 横向排版 */
        .content-grid {
            padding: 32px clamp(20px, 5vw, 80px) 60px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* 主要功能区域 - 横向排列 */
        .main-features {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 32px;
            align-items: stretch;
            min-height: 750px;
        }

        .main-features > * {
            display: flex;
            flex-direction: column;
        }

        .apple-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-large);
            padding: 40px;
            box-shadow: var(--shadow-medium);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        .apple-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        .apple-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-large);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-medium);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
        }

        .icon-monitoring {
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-cyan));
            box-shadow: 0 8px 32px rgba(0, 122, 255, 0.3);
        }

        .icon-detection {
            background: linear-gradient(135deg, var(--apple-green), var(--apple-yellow));
            box-shadow: 0 8px 32px rgba(52, 199, 89, 0.3);
        }

        .icon-3d {
            background: linear-gradient(135deg, var(--apple-purple), var(--apple-pink));
            box-shadow: 0 8px 32px rgba(175, 82, 222, 0.3);
        }

        .card-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .card-subtitle {
            font-size: 14px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        /* 视频容器 - 苹果风格 */
        .video-container {
            background: var(--bg-glass);
            border-radius: var(--radius-large);
            padding: 32px;
            border: 1px solid var(--border-primary);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            box-shadow: var(--shadow-medium);
        }

        .video-wrapper {
            position: relative;
            border-radius: var(--radius-medium);
            overflow: hidden;
            background: #000;
            box-shadow: var(--shadow-medium);
        }

        #videoElement {
            width: 100%;
            height: auto;
            min-height: 400px;
            max-height: 500px;
            object-fit: contain;
            display: block;
        }

        .main-features #videoElement {
            min-height: 350px;
            max-height: 450px;
        }

        .video-overlay {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .live-indicator {
            width: 8px;
            height: 8px;
            background: var(--apple-red);
            border-radius: 50%;
            margin-right: 8px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 状态指示器 */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 28px;
        }

        .status-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-secondary);
            border-radius: var(--radius-medium);
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .status-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border-primary);
        }

        .status-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--apple-green);
            display: block;
        }

        .status-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        /* 3D可视化容器 */
        .viz-container {
            background: var(--bg-secondary);
            border-radius: var(--radius-medium);
            padding: 24px;
            border: 1px solid var(--border-secondary);
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .main-features .viz-container {
            min-height: 320px;
        }

        #viz3D {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-small);
        }

        /* 苹果按钮系统 */
        .apple-button {
            background: var(--apple-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-medium);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .apple-button:hover {
            background: #0051D5;
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .apple-button:active {
            transform: translateY(0);
        }

        .apple-button.secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-primary);
        }

        .apple-button.secondary:hover {
            background: var(--bg-card);
            border-color: var(--border-primary);
            box-shadow: var(--shadow-medium);
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .main-features {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        @media (max-width: 768px) {
            .hero-section {
                padding: 24px 20px 20px;
            }

            .hero-stats {
                gap: 20px;
            }

            .content-grid {
                gap: 20px;
                padding: 20px 20px 40px;
            }

            .main-features {
                grid-template-columns: 1fr;
                gap: 20px;
                min-height: auto;
            }

            .nav-menu {
                display: none;
            }

            .apple-card {
                padding: 24px;
            }

            .video-container {
                padding: 24px;
            }

            .viz-container {
                min-height: 280px;
            }

            #videoElement {
                min-height: 280px;
                max-height: 350px;
            }
        }

        /* 加载动画 */
        .loading-shimmer {
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <!-- 苹果官网风格导航栏 -->
    <nav class="apple-nav">
        <a href="#" class="nav-logo">Pet Intelligence</a>
        <div class="nav-menu">
            <a href="#" class="nav-item active">监控</a>
            <a href="#" class="nav-item">分析</a>
            <a href="#" class="nav-item">设置</a>
            <a href="#" class="nav-item">关于</a>
        </div>
    </nav>

    <!-- 英雄区域 -->
    <section class="hero-section">
        <h1 class="hero-title">智能宠物监控系统</h1>
        <p class="hero-subtitle">
            结合先进的AI技术，为您的宠物提供全方位3D空间监控。
            实时检测、智能分析、精准定位。
        </p>
        <div class="hero-stats">
            <div class="stat-item">
                <span class="stat-number" id="detectionCount">0</span>
                <span class="stat-label">检测次数</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="accuracyRate">95.8%</span>
                <span class="stat-label">识别精度</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="responseTime">< 100ms</span>
                <span class="stat-label">响应时间</span>
            </div>
        </div>
    </section>

    <!-- 主要内容区域 -->
    <main class="content-grid">
        <!-- 主要功能模块 - 横向排列 -->
        <div class="main-features">
            <!-- 实时视频监控 -->
            <div class="video-container">
                <div class="card-header">
                    <div class="card-icon icon-monitoring">📹</div>
                    <div>
                        <h2 class="card-title">实时监控</h2>
                        <p class="card-subtitle">高清视频流，AI实时分析</p>
                    </div>
                </div>
                <div class="video-wrapper">
                    <img id="videoElement" src="/video_feed" alt="实时视频流">
                    <div class="video-overlay">
                        <span class="live-indicator"></span>
                        LIVE
                    </div>
                </div>
                <div class="status-grid">
                    <div class="status-item">
                        <span class="status-value" id="frameRate">30</span>
                        <span class="status-label">FPS</span>
                    </div>
                    <div class="status-item">
                        <span class="status-value" id="resolution">1080p</span>
                        <span class="status-label">分辨率</span>
                    </div>
                    <div class="status-item">
                        <span class="status-value" id="latency">45ms</span>
                        <span class="status-label">延迟</span>
                    </div>
                    <div class="status-item">
                        <span class="status-value" id="bandwidth">2.1MB/s</span>
                        <span class="status-label">带宽</span>
                    </div>
                </div>
            </div>

            <!-- AI检测分析 -->
            <div class="apple-card">
                <div class="card-header">
                    <div class="card-icon icon-detection">🤖</div>
                    <div>
                        <h2 class="card-title">AI检测</h2>
                        <p class="card-subtitle">智能识别宠物行为</p>
                    </div>
                </div>
                <div class="viz-container">
                    <div id="detectionResults">
                        <div style="text-align: center; color: var(--text-tertiary);">
                            <div style="font-size: 48px; margin-bottom: 16px;">🐾</div>
                            <p>正在分析中...</p>
                        </div>
                    </div>
                </div>
                <div style="margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap;">
                    <button class="apple-button" style="flex: 1; min-width: 100px;">开始检测</button>
                    <button class="apple-button secondary" style="flex: 1; min-width: 100px;">暂停分析</button>
                </div>
            </div>

            <!-- 3D空间定位 -->
            <div class="apple-card">
                <div class="card-header">
                    <div class="card-icon icon-3d">🏠</div>
                    <div>
                        <h2 class="card-title">3D定位</h2>
                        <p class="card-subtitle">立体空间位置追踪</p>
                    </div>
                </div>
                <div class="viz-container">
                    <img id="viz3D" src="/api/3d_visualization" alt="3D可视化"
                         onerror="this.src='/static/placeholder.png'">
                </div>
                <div style="margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap;">
                    <button class="apple-button" style="flex: 1; min-width: 100px;">刷新视图</button>
                    <button class="apple-button secondary" style="flex: 1; min-width: 100px;">导出数据</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 苹果风格平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // 实时数据更新
        function updateStats() {
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('detectionCount').textContent = data.detections || 0;
                    document.getElementById('frameRate').textContent = data.fps || 30;
                    document.getElementById('latency').textContent = (data.latency || 45) + 'ms';
                    document.getElementById('bandwidth').textContent = (data.bandwidth || 2.1) + 'MB/s';
                })
                .catch(console.error);
        }

        // 检测结果更新
        function updateDetectionResults() {
            fetch('/api/detections')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('detectionResults');
                    if (data.detections && data.detections.length > 0) {
                        container.innerHTML = data.detections.map(detection => `
                            <div style="margin: 8px 0; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                                <strong>${detection.class}</strong>
                                <span style="color: var(--text-secondary); margin-left: 12px;">
                                    置信度: ${(detection.confidence * 100).toFixed(1)}%
                                </span>
                            </div>
                        `).join('');
                    } else {
                        container.innerHTML = `
                            <div style="text-align: center; color: var(--text-tertiary);">
                                <div style="font-size: 48px; margin-bottom: 16px;">🐾</div>
                                <p>暂无检测结果</p>
                            </div>
                        `;
                    }
                })
                .catch(console.error);
        }

        // 3D可视化更新
        function update3DVisualization() {
            const viz3D = document.getElementById('viz3D');
            viz3D.src = '/api/3d_visualization?' + Date.now();
        }

        // 按钮事件
        document.querySelectorAll('.apple-button').forEach(button => {
            button.addEventListener('click', function() {
                // 苹果风格按钮反馈
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });

        // 定时更新
        setInterval(updateStats, 2000);
        setInterval(updateDetectionResults, 1000);
        setInterval(update3DVisualization, 3000);

        // 初始加载
        updateStats();
        updateDetectionResults();

        // 平滑的元素出现动画
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        // 为卡片添加入场动画
        document.querySelectorAll('.apple-card, .video-container').forEach(card => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            card.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
            observer.observe(card);
        });
    </script>
</body>
</html>
