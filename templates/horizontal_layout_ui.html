<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>🐱 AI Pet Monitoring Pro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            /* Apple-inspired colors */
            --apple-blue: #007AFF;
            --apple-green: #30D158;
            --apple-mint: #00C7BE;
            --apple-orange: #FF9F0A;
            --apple-pink: #FF375F;
            --apple-purple: #AF52DE;
            --apple-red: #FF3B30;
            --apple-yellow: #FFD60A;

            /* Tech dark theme */
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-tertiary: #1a1a1a;
            --bg-card: rgba(28, 28, 30, 0.85);
            --bg-card-hover: rgba(44, 44, 46, 0.9);

            /* Text colors */
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.85);
            --text-tertiary: rgba(255, 255, 255, 0.6);
            --text-quaternary: rgba(255, 255, 255, 0.4);

            /* Border and separators */
            --border-primary: rgba(255, 255, 255, 0.1);
            --border-secondary: rgba(255, 255, 255, 0.05);

            /* Shadows */
            --shadow-light: 0 1px 3px rgba(255, 255, 255, 0.05);
            --shadow-medium: 0 4px 12px rgba(0, 0, 0, 0.3);
            --shadow-heavy: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 20px rgba(0, 122, 255, 0.3);

            /* Timing functions */
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background:
                radial-gradient(circle at 10% 20%, rgba(0, 122, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(175, 82, 222, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(48, 209, 88, 0.05) 0%, transparent 50%),
                linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            height: 100vh;
            padding: 16px;
            line-height: 1.5;
            font-weight: 400;
            overflow: hidden;
            background-attachment: fixed;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 25px 25px, rgba(255, 255, 255, 0.01) 2px, transparent 2px);
            background-size: 50px 50px;
            animation: float 30s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50px, -50px); }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 16px;
            position: relative;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, var(--apple-blue) 50%, var(--apple-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .header .subtitle {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* 主要容器 - 完全横向布局 */
        .container {
            display: grid;
            grid-template-columns: 2fr 1fr 1.5fr 1fr;
            grid-template-rows: 1fr auto;
            gap: 16px;
            height: calc(100vh - 120px);
            max-width: 100%;
        }

        /* 底部分析条 */
        .analysis-bar {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 3fr 2fr 1fr;
            gap: 16px;
            height: 120px;
        }

        /* Card base style */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            transition: all 0.3s var(--ease-out);
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
        }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-secondary);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-purple));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            box-shadow: 0 0 10px rgba(0, 122, 255, 0.3);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--apple-green);
            box-shadow: 0 0 6px var(--apple-green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        /* 视频面板 - 主要区域 */
        .video-panel {
            position: relative;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: calc(100% - 50px);
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .video-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .video-overlay {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .video-info {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 检测面板 */
        .detection-panel {
            position: relative;
        }

        .detection-list {
            height: calc(100% - 50px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-primary) transparent;
        }

        .detection-list::-webkit-scrollbar {
            width: 3px;
        }

        .detection-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .detection-list::-webkit-scrollbar-thumb {
            background: var(--border-primary);
            border-radius: 2px;
        }

        .detection-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-secondary);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 8px;
            transition: all 0.2s var(--ease-out);
            position: relative;
        }

        .detection-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, var(--apple-green), var(--apple-mint));
        }

        .detection-item.dog::before {
            background: linear-gradient(180deg, var(--apple-blue), var(--apple-purple));
        }

        .detection-item.enhanced::before {
            background: linear-gradient(180deg, var(--apple-orange), var(--apple-yellow));
        }

        .detection-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(2px);
        }

        .pet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .pet-name {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .pet-emoji {
            font-size: 14px;
        }

        .confidence-badge {
            background: linear-gradient(135deg, var(--apple-green), var(--apple-mint));
            color: white;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
        }

        .detection-details {
            font-size: 10px;
            color: var(--text-tertiary);
            line-height: 1.3;
        }

        /* 3D可视化面板 */
        .visualization-panel {
            position: relative;
        }

        .visualization-container {
            width: 100%;
            height: calc(100% - 50px);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid var(--border-secondary);
        }

        .visualization-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        /* 状态面板 */
        .status-panel {
            position: relative;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            height: calc(100% - 50px);
        }

        .status-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-secondary);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            transition: all 0.2s var(--ease-out);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .status-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .status-value {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2px;
        }

        .status-value.error {
            background: linear-gradient(135deg, var(--apple-red), var(--apple-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-label {
            font-size: 8px;
            color: var(--text-tertiary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 底部分析条 */
        .analysis-card {
            background: var(--bg-card);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 12px;
            position: relative;
        }

        .analysis-card .card-header {
            margin-bottom: 8px;
            padding-bottom: 6px;
        }

        .analysis-card .card-title {
            font-size: 14px;
        }

        .analysis-card .card-icon {
            width: 20px;
            height: 20px;
            font-size: 10px;
        }

        .analysis-text {
            font-size: 12px;
            line-height: 1.4;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            padding: 8px;
            height: calc(100% - 40px);
            overflow-y: auto;
        }

        .progress-container {
            height: calc(100% - 40px);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--apple-blue), var(--apple-purple));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 8px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            padding: 4px 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 12px;
            font-weight: 600;
            color: var(--apple-mint);
        }

        .stat-label {
            font-size: 8px;
            color: var(--text-tertiary);
            text-transform: uppercase;
        }

        .mini-status-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            height: calc(100% - 40px);
        }

        .mini-status-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            padding: 6px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .mini-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--apple-blue);
            margin-bottom: 2px;
        }

        .mini-label {
            font-size: 7px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            position: relative;
        }

        .loading::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 1px solid transparent;
            border-top: 1px solid var(--apple-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            color: var(--text-quaternary);
            font-style: italic;
            padding: 20px 10px;
            font-weight: 500;
            font-size: 11px;
        }

        /* Floating action button */
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-purple));
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 122, 255, 0.4);
            transition: all 0.3s var(--spring);
            z-index: 1000;
        }

        .fab:hover {
            transform: scale(1.1);
        }

        .fab:active {
            transform: scale(0.95);
        }

        /* Responsive design */
        @media (max-width: 1400px) {
            .container {
                grid-template-columns: 1.5fr 1fr 1fr 0.8fr;
            }
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: 1fr 1fr auto;
            }

            .video-panel {
                grid-column: 1;
                grid-row: 1;
            }

            .detection-panel {
                grid-column: 2;
                grid-row: 1;
            }

            .visualization-panel {
                grid-column: 1;
                grid-row: 2;
            }

            .status-panel {
                grid-column: 2;
                grid-row: 2;
            }

            .analysis-bar {
                grid-column: 1 / -1;
                grid-row: 3;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto auto;
                height: auto;
            }

            .video-panel,
            .detection-panel,
            .visualization-panel,
            .status-panel {
                grid-column: 1;
                height: 250px;
            }

            .analysis-bar {
                grid-template-columns: 1fr;
                height: auto;
            }

            .fab {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }

        /* Entry animation */
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .card {
            animation: slideInRight 0.5s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐱 AI Pet Monitoring Pro - Dashboard</h1>
        <div class="subtitle">Horizontal Layout • Real-time Detection • 3D Spatial Intelligence</div>
    </div>

    <div class="container">
        <!-- 视频监控面板 -->
        <div class="card video-panel">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon">📹</div>
                    <span>实时监控</span>
                </div>
                <div class="status-dot"></div>
            </div>
            <div class="video-container">
                <img class="video-stream" src="{{ url_for('video_feed') }}" alt="Live Video Feed" />
                <div class="video-overlay">
                    <div class="video-info" id="video-info">LIVE</div>
                    <div class="video-info" id="frame-info">Frame: 0/0</div>
                </div>
            </div>
        </div>

        <!-- 检测结果面板 -->
        <div class="card detection-panel">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon">🎯</div>
                    <span>智能检测</span>
                </div>
                <div id="detection-count" style="font-size: 10px; color: var(--text-tertiary);">0</div>
            </div>
            <div class="detection-list" id="detections-container">
                <div class="no-data">等待检测结果...</div>
            </div>
        </div>

        <!-- 3D可视化面板 -->
        <div class="card visualization-panel">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon">🏠</div>
                    <span>3D空间</span>
                </div>
                <div style="font-size: 10px; color: var(--text-tertiary);">USD</div>
            </div>
            <div class="visualization-container">
                <div id="3d-visualization">
                    <div class="no-data">生成3D可视化...</div>
                </div>
            </div>
        </div>

        <!-- 系统状态面板 -->
        <div class="card status-panel">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon">⚡</div>
                    <span>系统状态</span>
                </div>
            </div>
            <div class="status-grid" id="status-container">
                <div class="status-item">
                    <div class="status-value"><div class="loading"></div></div>
                    <div class="status-label">加载中</div>
                </div>
            </div>
        </div>

        <!-- 底部分析条 -->
        <div class="analysis-bar">
            <!-- VLM分析 -->
            <div class="analysis-card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-icon">🤖</div>
                        <span>AI 行为分析</span>
                    </div>
                </div>
                <div class="analysis-text" id="vlm-analysis-text">
                    增强猫检测系统正在运行，使用多模态AI技术进行精准识别和空间定位...
                </div>
            </div>

            <!-- 进度统计 -->
            <div class="analysis-card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-icon">📊</div>
                        <span>播放进度</span>
                    </div>
                </div>
                <div class="progress-container" id="progress-container">
                    <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--text-tertiary);">
                        <span>进度</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="cat-stat">0</div>
                            <div class="stat-label">猫检测</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="dog-stat">0</div>
                            <div class="stat-label">狗检测</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="enhanced-stat">0</div>
                            <div class="stat-label">增强检测</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="3d-stat">0</div>
                            <div class="stat-label">3D定位</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 迷你状态 -->
            <div class="analysis-card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-icon">🔧</div>
                        <span>组件状态</span>
                    </div>
                </div>
                <div class="mini-status-grid" id="mini-status-grid">
                    <div class="mini-status-item">
                        <div class="mini-value">○</div>
                        <div class="mini-label">YOLO</div>
                    </div>
                    <div class="mini-status-item">
                        <div class="mini-value">○</div>
                        <div class="mini-label">USD</div>
                    </div>
                    <div class="mini-status-item">
                        <div class="mini-value">○</div>
                        <div class="mini-label">3D</div>
                    </div>
                    <div class="mini-status-item">
                        <div class="mini-value">○</div>
                        <div class="mini-label">VLM</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="fab" onclick="location.reload()" title="刷新页面">
        🔄
    </button>

    <script>
        // Global variables
        let currentFrame = 0;
        let totalFrames = 0;

        // Status update function
        function updateSystemStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error('Status error:', data.error);
                        return;
                    }

                    currentFrame = data.current_frame || 0;
                    totalFrames = data.total_frames || 0;

                    // Update frame info
                    document.getElementById('frame-info').textContent = `${currentFrame}/${totalFrames}`;

                    // Update progress
                    const progressPercent = totalFrames > 0 ? (currentFrame / totalFrames * 100) : 0;
                    document.getElementById('progress-percent').textContent = `${progressPercent.toFixed(1)}%`;
                    document.getElementById('progress-fill').style.width = `${progressPercent}%`;

                    // Update main status grid
                    const statusContainer = document.getElementById('status-container');
                    statusContainer.innerHTML = `
                        <div class="status-item">
                            <div class="status-value ${data.running ? '' : 'error'}">${data.running ? '●' : '○'}</div>
                            <div class="status-label">运行状态</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${data.current_detections || 0}</div>
                            <div class="status-label">当前检测</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${(data.cat_detection_rate || 0).toFixed(1)}%</div>
                            <div class="status-label">检测率</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${Math.floor(data.uptime_seconds || 0)}</div>
                            <div class="status-label">运行时长</div>
                        </div>
                    `;

                    // Update stats
                    document.getElementById('cat-stat').textContent = data.cat_detections || 0;
                    document.getElementById('dog-stat').textContent = data.dog_detections || 0;
                    document.getElementById('enhanced-stat').textContent = data.enhanced_cat_detections || 0;
                    document.getElementById('3d-stat').textContent = data['3d_localizations'] || 0;

                    // Update mini status
                    const miniGrid = document.getElementById('mini-status-grid');
                    miniGrid.innerHTML = `
                        <div class="mini-status-item">
                            <div class="mini-value" style="color: ${data.components?.yolo_loaded ? 'var(--apple-green)' : 'var(--apple-red)'};">●</div>
                            <div class="mini-label">YOLO</div>
                        </div>
                        <div class="mini-status-item">
                            <div class="mini-value" style="color: ${data.components?.usd_model_loaded ? 'var(--apple-green)' : 'var(--apple-red)'};">●</div>
                            <div class="mini-label">USD</div>
                        </div>
                        <div class="mini-status-item">
                            <div class="mini-value" style="color: ${data.components?.['3d_model_loaded'] ? 'var(--apple-green)' : 'var(--apple-red)'};">●</div>
                            <div class="mini-label">3D</div>
                        </div>
                        <div class="mini-status-item">
                            <div class="mini-value" style="color: ${data.components?.vlm_cat_frames > 0 ? 'var(--apple-green)' : 'var(--apple-red)'};">●</div>
                            <div class="mini-label">VLM</div>
                        </div>
                    `;
                })
                .catch(error => console.error('Error fetching status:', error));
        }

        // Detection results update function
        function updateDetections() {
            fetch('/api/detections')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error('Detections error:', data.error);
                        return;
                    }

                    const detectionsContainer = document.getElementById('detections-container');
                    const detectionCount = document.getElementById('detection-count');

                    if (!data.current_detections || data.current_detections.length === 0) {
                        detectionsContainer.innerHTML = '<div class="no-data">暂无检测</div>';
                        detectionCount.textContent = '0';
                    } else {
                        detectionCount.textContent = data.current_detections.length;

                        detectionsContainer.innerHTML = data.current_detections.map(detection => {
                            const isEnhanced = detection.detection_type === 'enhanced_cat' || detection.detection_type === 'vlm_assisted';
                            const petEmoji = detection.class_name === 'cat' ? '🐱' : '🐶';

                            return `
                                <div class="detection-item ${detection.class_name} ${isEnhanced ? 'enhanced' : ''}">
                                    <div class="pet-header">
                                        <div class="pet-name">
                                            <span class="pet-emoji">${petEmoji}</span>
                                            <span>${detection.class_name}</span>
                                        </div>
                                        <div class="confidence-badge">${(detection.confidence * 100).toFixed(0)}%</div>
                                    </div>
                                    <div class="detection-details">
                                        像素: (${detection.center.x}, ${detection.center.y})<br>
                                        ${detection['3d_valid'] ?
                                            `物理: (${detection['3d_position']['calibrated_coords'].x.toFixed(1)}, ${detection['3d_position']['calibrated_coords'].y.toFixed(1)}m)<br>位置: ${detection['3d_position']['room_position']}`
                                            : '3D: 无法定位'}
                                    </div>
                                </div>
                            `;
                        }).join('');
                    }

                    // Update VLM analysis
                    if (data.latest_vlm_analysis) {
                        document.getElementById('vlm-analysis-text').textContent = data.latest_vlm_analysis.text;
                    }
                })
                .catch(error => console.error('Error fetching detections:', error));
        }

        // 3D visualization update function
        function update3DVisualization() {
            fetch('/api/3d_visualization')
                .then(response => response.json())
                .then(data => {
                    const visualizationDiv = document.getElementById('3d-visualization');

                    if (data.error) {
                        visualizationDiv.innerHTML = '<div class="no-data">暂无3D数据</div>';
                    } else if (data.image) {
                        visualizationDiv.innerHTML = `<img class="visualization-image" src="data:image/png;base64,${data.image}" alt="3D Visualization" />`;
                    }
                })
                .catch(error => {
                    console.error('Error fetching 3D visualization:', error);
                    document.getElementById('3d-visualization').innerHTML = '<div class="no-data">3D加载失败</div>';
                });
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Add staggered animation to cards
            const cards = document.querySelectorAll('.card, .analysis-card');
            cards.forEach((card, index) => {
                card.style.animationDelay = `${index * 0.1}s`;
            });

            // Immediate updates
            updateSystemStatus();
            updateDetections();
            update3DVisualization();

            // Set up periodic updates
            setInterval(updateSystemStatus, 3000);    // Every 3 seconds
            setInterval(updateDetections, 2000);      // Every 2 seconds
            setInterval(update3DVisualization, 8000); // Every 8 seconds
        });

        // Error handling
        window.onerror = function(msg, url, line, col, error) {
            console.error('JavaScript Error:', msg);
            return false;
        };
    </script>
</body>
</html>
