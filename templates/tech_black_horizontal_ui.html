<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>🐱 AI宠物监控系统</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            /* Tech colors */
            --primary-blue: #00D4FF;
            --secondary-blue: #0099CC;
            --accent-green: #00FF88;
            --accent-orange: #FF6B35;
            --accent-purple: #8B5FBF;
            --accent-pink: #FF3B7D;

            /* Dark theme */
            --bg-primary: #0A0A0A;
            --bg-secondary: #111111;
            --bg-card: rgba(20, 20, 20, 0.9);
            --bg-glass: rgba(30, 30, 30, 0.8);

            /* Text */
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --text-muted: rgba(255, 255, 255, 0.5);

            /* Borders */
            --border-light: rgba(255, 255, 255, 0.1);
            --border-medium: rgba(255, 255, 255, 0.2);

            /* Effects */
            --glow-blue: 0 0 20px rgba(0, 212, 255, 0.3);
            --glow-green: 0 0 15px rgba(0, 255, 136, 0.3);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 95, 191, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            height: 100vh;
            padding: 16px;
            overflow: hidden;
            background-attachment: fixed;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 30px); }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 16px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--glow-blue);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            text-shadow: var(--glow-blue);
        }

        .header .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Horizontal container - 横向均匀布局 */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr auto;
            gap: 16px;
            height: calc(100vh - 120px);
        }

        /* Bottom analysis bar */
        .analysis-bar {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 16px;
            height: 100px;
        }

        /* Card base style */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-blue), transparent);
            opacity: 0.6;
        }

        .card:hover {
            border-color: var(--border-medium);
            box-shadow: var(--glow-blue);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            box-shadow: var(--glow-blue);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: var(--glow-green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        /* Video panel - 第一列 */
        .video-panel {
            position: relative;
        }

        .video-container {
            width: 100%;
            height: calc(100% - 50px);
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-light);
        }

        .video-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .video-overlay {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        .video-info {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: var(--accent-green);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            border: 1px solid var(--border-light);
            box-shadow: var(--glow-green);
        }

        /* Detection panel - 第二列 */
        .detection-panel {
            position: relative;
        }

        .detection-list {
            height: calc(100% - 50px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-blue) transparent;
        }

        .detection-list::-webkit-scrollbar {
            width: 4px;
        }

        .detection-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .detection-list::-webkit-scrollbar-thumb {
            background: var(--primary-blue);
            border-radius: 2px;
        }

        .detection-item {
            background: rgba(30, 30, 30, 0.6);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            position: relative;
            transition: all 0.2s ease;
        }

        .detection-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-green);
            border-radius: 0 3px 3px 0;
        }

        .detection-item.dog::before {
            background: var(--primary-blue);
        }

        .detection-item.enhanced::before {
            background: var(--accent-orange);
        }

        .detection-item:hover {
            background: rgba(40, 40, 40, 0.8);
            border-color: var(--border-medium);
            transform: translateX(3px);
        }

        .pet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .pet-name {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .confidence-badge {
            background: linear-gradient(135deg, var(--accent-green), #00CC66);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
        }

        .detection-details {
            font-size: 10px;
            color: var(--text-muted);
            line-height: 1.3;
        }

        /* Visualization panel - 第三列 */
        .visualization-panel {
            position: relative;
        }

        .visualization-container {
            width: 100%;
            height: calc(100% - 50px);
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .visualization-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }

        /* Status panel - 第四列 */
        .status-panel {
            position: relative;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            height: calc(100% - 50px);
        }

        .status-item {
            background: rgba(30, 30, 30, 0.6);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .status-item:hover {
            background: rgba(40, 40, 40, 0.8);
            border-color: var(--primary-blue);
            box-shadow: var(--glow-blue);
        }

        .status-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 2px;
            text-shadow: var(--glow-blue);
        }

        .status-value.error {
            color: var(--accent-pink);
        }

        .status-label {
            font-size: 8px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Bottom analysis bar */
        .analysis-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 12px;
            position: relative;
        }

        .analysis-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            border-radius: 12px 12px 0 0;
        }

        .analysis-card.vlm::before {
            background: linear-gradient(90deg, var(--accent-orange), var(--accent-pink));
        }

        .analysis-card.progress::before {
            background: linear-gradient(90deg, var(--primary-blue), var(--secondary-blue));
        }

        .analysis-card.mini::before {
            background: linear-gradient(90deg, var(--accent-green), #00CC66);
        }

        .analysis-text {
            font-size: 11px;
            line-height: 1.4;
            color: var(--text-secondary);
            background: rgba(20, 20, 20, 0.6);
            border-radius: 6px;
            padding: 8px;
            height: calc(100% - 30px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-blue) transparent;
        }

        .progress-container {
            height: calc(100% - 30px);
            display: flex;
            flex-direction: column;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 4px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-green));
            border-radius: 2px;
            transition: width 0.3s ease;
            box-shadow: var(--glow-blue);
        }

        .stats-mini {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            flex: 1;
            margin-top: 4px;
        }

        .stat-item {
            background: rgba(30, 30, 30, 0.6);
            border-radius: 4px;
            padding: 4px;
            text-align: center;
        }

        .stat-value {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-green);
        }

        .stat-label {
            font-size: 7px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .components-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            height: calc(100% - 30px);
        }

        .component-item {
            background: rgba(30, 30, 30, 0.6);
            border-radius: 6px;
            padding: 6px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .component-status {
            font-size: 12px;
            margin-bottom: 2px;
        }

        .component-status.online {
            color: var(--accent-green);
            text-shadow: var(--glow-green);
        }

        .component-status.offline {
            color: var(--accent-pink);
        }

        .component-label {
            font-size: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid transparent;
            border-top: 2px solid var(--primary-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 20px 10px;
            font-size: 11px;
        }

        /* Floating refresh button */
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            box-shadow: var(--glow-blue);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px var(--primary-blue);
        }

        .fab:active {
            transform: scale(0.95);
        }

        /* Responsive design */
        @media (max-width: 1400px) {
            .container {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: 1fr 1fr auto;
            }

            .video-panel {
                grid-column: 1;
                grid-row: 1;
            }

            .detection-panel {
                grid-column: 2;
                grid-row: 1;
            }

            .visualization-panel {
                grid-column: 1;
                grid-row: 2;
            }

            .status-panel {
                grid-column: 2;
                grid-row: 2;
            }

            .analysis-bar {
                grid-column: 1 / -1;
                grid-row: 3;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto auto;
                height: auto;
            }

            .analysis-bar {
                grid-template-columns: 1fr;
                height: auto;
            }

            .fab {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }

        /* Entry animations */
        @keyframes slideInFromRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .card, .analysis-card {
            animation: slideInFromRight 0.6s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐱 AI宠物监控系统 • 横屏科技版</h1>
        <div class="subtitle">增强猫检测 • 3D空间定位 • 实时行为分析 • USD建模</div>
    </div>

    <div class="container">
        <!-- 第一列：实时视频 -->
        <div class="card video-panel">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon">📹</div>
                    <span>实时监控</span>
                </div>
                <div class="status-dot"></div>
            </div>
            <div class="video-container">
                <img class="video-stream" src="{{ url_for('video_feed') }}" alt="Live Video Feed" />
                <div class="video-overlay">
                    <div class="video-info">🔴 LIVE</div>
                    <div class="video-info" id="frame-info">0/0</div>
                </div>
            </div>
        </div>

        <!-- 第二列：检测结果 -->
        <div class="card detection-panel">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon">🎯</div>
                    <span>智能检测</span>
                </div>
                <div id="detection-count" style="font-size: 10px; color: var(--text-muted);">0</div>
            </div>
            <div class="detection-list" id="detections-container">
                <div class="no-data">等待检测中...</div>
            </div>
        </div>

        <!-- 第三列：3D可视化 -->
        <div class="card visualization-panel">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon">🏠</div>
                    <span>3D空间</span>
                </div>
                <div style="font-size: 10px; color: var(--text-muted);">USD</div>
            </div>
            <div class="visualization-container">
                <div id="3d-visualization">
                    <div class="no-data">生成3D可视化...</div>
                </div>
            </div>
        </div>

        <!-- 第四列：系统状态 -->
        <div class="card status-panel">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon">⚡</div>
                    <span>状态</span>
                </div>
            </div>
            <div class="status-grid" id="status-container">
                <div class="status-item">
                    <div class="status-value"><div class="loading"></div></div>
                    <div class="status-label">加载中</div>
                </div>
            </div>
        </div>

        <!-- 底部分析条 -->
        <div class="analysis-bar">
            <!-- VLM分析 -->
            <div class="analysis-card vlm">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-icon">🤖</div>
                        <span>AI分析</span>
                    </div>
                </div>
                <div class="analysis-text" id="vlm-analysis-text">
                    系统正在运行增强猫检测算法，集成YOLO目标检测与VLM智能分析...
                </div>
            </div>

            <!-- 进度统计 -->
            <div class="analysis-card progress">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-icon">📊</div>
                        <span>进度</span>
                    </div>
                </div>
                <div class="progress-container">
                    <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 2px;">
                        <span style="color: var(--text-muted);">播放</span>
                        <span id="progress-percent" style="color: var(--primary-blue);">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
                    </div>
                    <div class="stats-mini">
                        <div class="stat-item">
                            <div class="stat-value" id="cat-stat">0</div>
                            <div class="stat-label">猫</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="dog-stat">0</div>
                            <div class="stat-label">狗</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="enhanced-stat">0</div>
                            <div class="stat-label">增强</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="3d-stat">0</div>
                            <div class="stat-label">3D</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 组件状态 -->
            <div class="analysis-card mini">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-icon">🔧</div>
                        <span>组件</span>
                    </div>
                </div>
                <div class="components-grid" id="components-grid">
                    <div class="component-item">
                        <div class="component-status">⚪</div>
                        <div class="component-label">YOLO</div>
                    </div>
                    <div class="component-item">
                        <div class="component-status">⚪</div>
                        <div class="component-label">USD</div>
                    </div>
                    <div class="component-item">
                        <div class="component-status">⚪</div>
                        <div class="component-label">3D</div>
                    </div>
                    <div class="component-item">
                        <div class="component-status">⚪</div>
                        <div class="component-label">VLM</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="fab" onclick="location.reload()" title="刷新">
        🔄
    </button>

    <script>
        // Global variables
        let currentFrame = 0;
        let totalFrames = 0;

        // Status update function
        function updateSystemStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error('Status error:', data.error);
                        return;
                    }

                    currentFrame = data.current_frame || 0;
                    totalFrames = data.total_frames || 0;

                    // Update frame info
                    document.getElementById('frame-info').textContent = `${currentFrame}/${totalFrames}`;

                    // Update progress
                    const progressPercent = totalFrames > 0 ? (currentFrame / totalFrames * 100) : 0;
                    document.getElementById('progress-percent').textContent = `${progressPercent.toFixed(1)}%`;
                    document.getElementById('progress-fill').style.width = `${progressPercent}%`;

                    // Update main status grid
                    const statusContainer = document.getElementById('status-container');
                    statusContainer.innerHTML = `
                        <div class="status-item">
                            <div class="status-value ${data.running ? '' : 'error'}">${data.running ? '●' : '○'}</div>
                            <div class="status-label">运行</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${data.current_detections || 0}</div>
                            <div class="status-label">检测</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${(data.cat_detection_rate || 0).toFixed(0)}%</div>
                            <div class="status-label">检出率</div>
                        </div>
                        <div class="status-item">
                            <div class="status-value">${Math.floor(data.uptime_seconds || 0)}</div>
                            <div class="status-label">运行时长</div>
                        </div>
                    `;

                    // Update stats
                    document.getElementById('cat-stat').textContent = data.cat_detections || 0;
                    document.getElementById('dog-stat').textContent = data.dog_detections || 0;
                    document.getElementById('enhanced-stat').textContent = data.enhanced_cat_detections || 0;
                    document.getElementById('3d-stat').textContent = data['3d_localizations'] || 0;

                    // Update components
                    const componentsGrid = document.getElementById('components-grid');
                    componentsGrid.innerHTML = `
                        <div class="component-item">
                            <div class="component-status ${data.components?.yolo_loaded ? 'online' : 'offline'}">●</div>
                            <div class="component-label">YOLO</div>
                        </div>
                        <div class="component-item">
                            <div class="component-status ${data.components?.usd_model_loaded ? 'online' : 'offline'}">●</div>
                            <div class="component-label">USD</div>
                        </div>
                        <div class="component-item">
                            <div class="component-status ${data.components?.['3d_model_loaded'] ? 'online' : 'offline'}">●</div>
                            <div class="component-label">3D</div>
                        </div>
                        <div class="component-item">
                            <div class="component-status ${data.components?.vlm_cat_frames > 0 ? 'online' : 'offline'}">●</div>
                            <div class="component-label">VLM</div>
                        </div>
                    `;
                })
                .catch(error => console.error('Error fetching status:', error));
        }

        // Detection results update function
        function updateDetections() {
            fetch('/api/detections')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        console.error('Detections error:', data.error);
                        return;
                    }

                    const detectionsContainer = document.getElementById('detections-container');
                    const detectionCount = document.getElementById('detection-count');

                    if (!data.current_detections || data.current_detections.length === 0) {
                        detectionsContainer.innerHTML = '<div class="no-data">暂无检测</div>';
                        detectionCount.textContent = '0';
                    } else {
                        detectionCount.textContent = data.current_detections.length;

                        detectionsContainer.innerHTML = data.current_detections.map(detection => {
                            const isEnhanced = detection.detection_type === 'enhanced_cat' || detection.detection_type === 'vlm_assisted';
                            const petEmoji = detection.class_name === 'cat' ? '🐱' : '🐶';

                            return `
                                <div class="detection-item ${detection.class_name} ${isEnhanced ? 'enhanced' : ''}">
                                    <div class="pet-header">
                                        <div class="pet-name">
                                            <span>${petEmoji}</span>
                                            <span>${detection.class_name}</span>
                                        </div>
                                        <div class="confidence-badge">${(detection.confidence * 100).toFixed(0)}%</div>
                                    </div>
                                    <div class="detection-details">
                                        像素: (${detection.center.x}, ${detection.center.y})<br>
                                        ${detection['3d_valid'] ?
                                            `物理: (${detection['3d_position']['calibrated_coords'].x.toFixed(1)}, ${detection['3d_position']['calibrated_coords'].y.toFixed(1)})<br>位置: ${detection['3d_position']['room_position']}`
                                            : '3D: 无法定位'}
                                    </div>
                                </div>
                            `;
                        }).join('');
                    }

                    // Update VLM analysis
                    if (data.latest_vlm_analysis) {
                        document.getElementById('vlm-analysis-text').textContent = data.latest_vlm_analysis.text;
                    }
                })
                .catch(error => console.error('Error fetching detections:', error));
        }

        // 3D visualization update function
        function update3DVisualization() {
            fetch('/api/3d_visualization')
                .then(response => response.json())
                .then(data => {
                    const visualizationDiv = document.getElementById('3d-visualization');

                    if (data.error) {
                        visualizationDiv.innerHTML = '<div class="no-data">暂无数据</div>';
                    } else if (data.image) {
                        visualizationDiv.innerHTML = `<img class="visualization-image" src="data:image/png;base64,${data.image}" alt="3D Visualization" />`;
                    }
                })
                .catch(error => {
                    console.error('Error fetching 3D visualization:', error);
                    document.getElementById('3d-visualization').innerHTML = '<div class="no-data">加载失败</div>';
                });
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Add staggered animation
            const cards = document.querySelectorAll('.card, .analysis-card');
            cards.forEach((card, index) => {
                card.style.animationDelay = `${index * 0.1}s`;
            });

            // Immediate updates
            updateSystemStatus();
            updateDetections();
            update3DVisualization();

            // Set up periodic updates
            setInterval(updateSystemStatus, 3000);    // Every 3 seconds
            setInterval(updateDetections, 2000);      // Every 2 seconds
            setInterval(update3DVisualization, 8000); // Every 8 seconds
        });

        // Error handling
        window.onerror = function(msg, url, line, col, error) {
            console.error('JavaScript Error:', msg);
            return false;
        };
    </script>
</body>
</html>
