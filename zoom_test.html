<!DOCTYPE html>
<html>
<head>
    <title>PTZ缩放功能测试</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { background: #007bff; color: white; padding: 15px 20px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #0056b3; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #1e7e34; }
        .btn-warning { background: #ffc107; color: #000; }
        .btn-warning:hover { background: #e0a800; }
        .status { margin: 20px 0; padding: 15px; border-radius: 5px; background: #e9ecef; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        h1 { color: #333; text-align: center; }
        .controls { text-align: center; margin: 30px 0; }
        .instruction { background: #cce7ff; padding: 15px; border-radius: 5px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 PTZ缩放功能测试器</h1>

        <div class="instruction">
            <strong>📝 测试步骤：</strong><br>
            1. 点击"🔍 放大"观察画面变化<br>
            2. 点击"🔎 缩小"测试缩小效果<br>
            3. 点击"🎯 重置"恢复原始大小<br>
        </div>

        <div class="controls">
            <button class="btn" onclick="testZoom('zoom_in')">🔍 放大</button>
            <button class="btn btn-warning" onclick="testZoom('zoom_out')">🔎 缩小</button>
            <button class="btn btn-success" onclick="testZoom('zoom_reset')">🎯 重置原始大小</button>
        </div>

        <div class="controls">
            <button class="btn" onclick="autoTest()" style="background: #6f42c1;">🤖 自动测试序列</button>
        </div>

        <div id="status" class="status">准备测试...</div>

        <div style="margin-top: 20px; font-size: 14px; color: #666;">
            <strong>💡 提示：</strong><br>
            • 每个操作需要几秒钟才能看到效果<br>
            • 建议同时观察摄像头画面变化<br>
            • 如果看不到效果，可能是摄像头型号限制<br>
        </div>
    </div>

    <script>
        function updateStatus(message, type = 'normal') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status';
            if (type === 'success') statusDiv.classList.add('success');
            if (type === 'error') statusDiv.classList.add('error');
        }

        function testZoom(action) {
            const actionNames = {
                'zoom_in': '🔍 放大',
                'zoom_out': '🔎 缩小',
                'zoom_reset': '🎯 重置原始大小'
            };

            updateStatus(`正在执行: ${actionNames[action]}...`);

            // 直接调用PTZ API
            const data = {
                'zoom_in': {"method": "ptz_move_start", "param": {"channelid": 0, "zoomIn": 200}},
                'zoom_out': {"method": "ptz_move_start", "param": {"channelid": 0, "zoomOut": 200}},
                'zoom_reset': {"method": "ptz_move_start", "param": {"channelid": 0, "zoom": 0}}
            };

            fetch('https://192.168.31.146/ipc/grpc_cmd', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'SessionId': 'A14CA28A5890F9F378389B37CFF9A46'
                },
                body: JSON.stringify(data[action])
            })
            .then(response => response.json())
            .then(data => {
                if (data.error && data.error.errorcode === 0) {
                    updateStatus(`✅ ${actionNames[action]} 执行成功！请观察画面变化`, 'success');
                } else {
                    updateStatus(`❌ ${actionNames[action]} 失败: ${JSON.stringify(data)}`, 'error');
                }
            })
            .catch(error => {
                updateStatus(`❌ 网络错误: ${error.message}`, 'error');
            });
        }

        function autoTest() {
            updateStatus('🤖 开始自动测试序列...');

            setTimeout(() => {
                updateStatus('1/3 执行放大...');
                testZoom('zoom_in');
            }, 1000);

            setTimeout(() => {
                updateStatus('2/3 执行缩小...');
                testZoom('zoom_out');
            }, 5000);

            setTimeout(() => {
                updateStatus('3/3 重置到原始大小...');
                testZoom('zoom_reset');
            }, 9000);

            setTimeout(() => {
                updateStatus('✅ 自动测试完成！检查画面是否恢复到原始大小', 'success');
            }, 13000);
        }

        updateStatus('📱 PTZ缩放测试器已就绪，点击按钮开始测试');
    </script>
</body>
</html>
